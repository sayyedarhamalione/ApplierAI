[project]
name = "job-applier-browser"
version = "0.1.0"
description = "Playwright browser automation with anti-detection"
requires-python = ">=3.11"
dependencies = [
    "job-applier-core",
    "playwright>=1.48",
    "playwright-stealth>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
