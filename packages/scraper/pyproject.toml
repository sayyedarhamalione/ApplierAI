[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "applieria-scraper"
version = "0.1.0"
description = "ApplierAI job scraper — JobSpy + ATS crawlers + RSS"
requires-python = ">=3.11"

dependencies = [
    "python-jobspy>=0.1.0",
    "httpx[http2]>=0.27.0",
    "pydantic>=2.7.0",
    "feedparser>=6.0.11",  # fallback RSS parser (WWR alternate feeds)
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",          # mock httpx
    "pytest-cov",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
