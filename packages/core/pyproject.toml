[project]
name = "job-applier-core"
version = "0.1.0"
description = "Shared domain logic: models, matching, AI, config"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "qdrant-client>=1.11",
    "sentence-transformers>=3.0",
    "anthropic>=0.40",
    "httpx>=0.27",
    "supabase>=2.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
