[project]
name = "applierai-api"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "supabase>=2.5.0",
    "httpx>=0.27.0",
    "applierai-core",      # workspace package
    "applierai-scraper",   # workspace package
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "httpx", "respx"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]