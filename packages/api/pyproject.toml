[project]
name = "job-applier-api"
version = "0.1.0"
description = "FastAPI backend for dashboard"
requires-python = ">=3.11"
dependencies = [
    "job-applier-core",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "supabase>=2.5",
    "python-multipart>=0.0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
