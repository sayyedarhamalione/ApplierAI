[project]
name = "job-applier-orchestrator"
version = "0.1.0"
description = "LangGraph agent graph and Temporal workflows"
requires-python = ">=3.11"
dependencies = [
    "job-applier-core",
    "job-applier-browser",
    "langgraph>=0.2",
    "temporalio>=1.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
