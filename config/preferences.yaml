# Job Applier 2026 — Search Preferences

search:
  keywords:
    - "software engineer"
    - "backend developer"
    - "full stack engineer"
  locations:
    - "Remote"
    - "San Francisco"
  salary_min: 120000
  job_types:
    - "full-time"
  experience_level:
    - "mid-senior"

matching:
  score_threshold: 0.65
  max_jobs_per_run: 50
  daily_apply_limit: 25

platforms:
  linkedin:
    enabled: true
    easy_apply_only: false
    cookies_file: "./config/linkedin_cookies.json"
    proxy: "residential-us"
  indeed:
    enabled: true
    cookies_file: "./config/indeed_cookies.json"
    proxy: "residential-us"
  wellfound:
    enabled: true
    cookies_file: "./config/wellfound_cookies.json"
    proxy: "residential-us"

apply:
  cover_letter: true
  follow_up_days: 5
  skip_if_applied: true
