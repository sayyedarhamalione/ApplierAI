version: "3.8"

services:
  # ─── Qdrant Vector DB ───
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Temporal Server ───
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Temporal Web UI ───
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # ─── Supabase (local dev — or use cloud) ───
  # For production, use Supabase Cloud instead.
  # Uncomment below for full local Supabase stack.
  #
  # supabase-db:
  #   image: supabase/postgres:15.1.0.147
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_PASSWORD: supabase
  #   volumes:
  #     - supabase_data:/var/lib/postgresql/data

volumes:
  qdrant_data:
  postgres_data:
